version: "3.9"

services:

  postgres:
    image: postgres:14

    container_name: tiger_db

    environment:
      POSTGRES_USER: tiger_admin
      POSTGRES_PASSWORD: tiger123
      POSTGRES_DB: tiger_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard

    ports:
      - "8501:8501"

    env_file:
      - .env

    depends_on:
      - api

volumes:
  postgres_data:
